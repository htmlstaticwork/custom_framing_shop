<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Artisan Woodworks</title>
    <meta name="description"
        content="Login to your Artisan Woodworks account to manage your custom orders and project history.">
    <meta name="author" content="Artisan Woodworks">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="https://cdn-icons-png.flaticon.com/512/1037/1037815.png">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        .auth-card {
            max-width: 500px;
            margin: 100px auto;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: var(--shadow-premium);
            border: 1px solid rgba(var(--accent-color-rgb), 0.1);
        }

        .auth-header {
            background: var(--premium-dark);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
        }

        .auth-body {
            padding: 3rem;
            background: white;
        }

        [data-theme="dark"] .auth-body {
            background: var(--card-bg);
        }

        /* Border & Button Visibility Pass */
        [data-theme="dark"] .auth-card {
            border: 1px solid rgba(245, 230, 204, 0.15) !important;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
        }

        [data-theme="dark"] .form-control {
            border-color: rgba(245, 230, 204, 0.1) !important;
            color: #fff !important;
        }

        [data-theme="dark"] .form-text {
            color: var(--muted-text) !important;
            opacity: 0.8 !important;
        }

        /* Light Mode Auth Header Fix */
        [data-theme="light"] .auth-header {
            background: var(--light-bg) !important;
            color: var(--primary-color) !important;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        [data-theme="light"] .auth-header span {
            color: var(--accent-color) !important;
        }

        [data-theme="light"] .auth-header p {
            color: var(--primary-color) !important;
            opacity: 0.8 !important;
        }
    </style>
</head>

<body>

    <!-- Theme & RTL Toggles (Right Top Corner) -->
    <div class="position-absolute top-0 end-0 p-4 d-flex gap-3 align-items-center" style="z-index: 1050;">
        <div class="theme-toggle" id="themeToggle" title="Toggle Dark/Light Mode">
            <i class="fa-solid fa-moon"></i>
        </div>
        <div class="rtl-toggle" id="rtlToggle" title="Toggle RTL">
            <i class="fa-solid fa-language"></i>
        </div>
    </div>

    <!-- Login Section -->
    <main class="container py-md-5">
        <div class="auth-card mx-auto" data-aos="zoom-in" style="overflow-x: hidden;">
            <div class="auth-header">
                <a class="navbar-brand d-flex align-items-center justify-content-center mb-4" href="index.html">
                    <i class="fa-solid fa-fire-burner me-3" style="color: var(--accent-color);"></i>
                    <span>ARTISAN</span>
                </a>
                <p class="small opacity-75 mt-2 mb-0">Continue your preservation journey</p>
            </div>
            <div class="auth-body">
                <form class="needs-validation" novalidate>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0"><i
                                    class="fa-solid fa-envelope text-muted"></i></span>
                            <input type="email" class="form-control border-start-0" required placeholder="Email">
                            <div class="invalid-feedback">Please enter a valid email.</div>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0"><i
                                    class="fa-solid fa-lock text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 border-end-0" required
                                placeholder="Password">
                            <button type="button" class="input-group-text border-start-0 password-toggle-btn"
                                title="Toggle Password">
                                <i class="fa-solid fa-eye text-muted"></i>
                            </button>
                            <div class="invalid-feedback">Please enter your password.</div>
                        </div>
                    </div>
                    <div class="mb-4 d-flex justify-content-between align-items-center">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe">
                            <label class="form-check-label small" for="rememberMe">Remember me</label>
                        </div>
                        <a href="#" class="small text-accent text-decoration-none fw-bold">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-rustic w-100 py-3 mb-4">Login to Account</button>

                    <!-- Social Login -->
                    <div class="mt-4 pt-4 border-top">
                        <p class="text-center small text-muted mb-4 text-uppercase fw-bold ls-1">Or continue with</p>
                        <div class="d-flex flex-column flex-sm-row gap-2 gap-sm-3">
                            <button type="button"
                                class="btn btn-outline-dark flex-fill py-2 d-flex align-items-center justify-content-center border-opacity-25 shadow-sm social-auth-btn">
                                <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google"
                                    style="width: 18px;" class="me-2">
                                <span class="small fw-bold">Google</span>
                            </button>
                            <button type="button"
                                class="btn btn-outline-dark flex-fill py-2 d-flex align-items-center justify-content-center border-opacity-25 shadow-sm social-auth-btn">
                                <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" alt="Facebook"
                                    style="width: 18px;" class="me-2">
                                <span class="small fw-bold">Facebook</span>
                            </button>
                        </div>
                    </div>

                    <p class="text-center small text-muted mt-5 mb-0">
                        Don't have an account? <a href="signup.html"
                            class="text-accent fw-bold text-decoration-none">Sign Up</a>
                    </p>
                </form>
            </div>
        </div>
    </main>


    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
